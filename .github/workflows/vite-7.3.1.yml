name: vite 7.3.1
on:
  workflow_dispatch:

jobs:
  test:
    name: vite 7.3.1
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Pick Vite version 7.3.1
        run: yarn set resolution "vite@npm:^6.0.0 || ^7.0.0 || ^8.0.0-0" "npm:7.3.1"

      - name: Run tests
        run: yarn vitest
