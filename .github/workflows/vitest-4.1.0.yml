name: vitest-4.1.0
on:
  workflow_dispatch:

jobs:
  test:
    name: vitest-4.1.0
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Pick Vitest version 4.1.0
        run: yarn up vitest@4.1.0

      - name: Run tests
        run: yarn test
